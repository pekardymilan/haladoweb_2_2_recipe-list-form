<mat-card [style.width]="'25vw'">
  <mat-card-header>
    <mat-card-title>
      <mat-checkbox (change)="onSelect()"></mat-checkbox>
      {{ recipe().name }} ({{ recipe().recipeCode }})
    </mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <p>{{ recipe().description }}</p>
  </mat-card-content>
  <mat-card-footer [style.margin-inline]="'5px'">
    <mat-chip-set>
      @for(ingredient of recipe().ingredients; track ingredient.name){
      <mat-chip>
        {{ ingredient.name }} x {{ ingredient.quantity }}
        {{ ingredient.unitOfMeasurement }}
      </mat-chip>
      }
    </mat-chip-set>
  </mat-card-footer>
</mat-card>
